<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shibez VOD Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600&family=DM+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1a1a1e;
    --border: #2a2a30;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #e8e8f0;
    --muted: #6b6b7a;
    --live: #ff4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
    --sidebar-w: 340px;
    --topbar-h: 54px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOPBAR */
  .topbar {
    height: var(--topbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span {
    color: var(--accent);
  }
  .logo-dot.live { background: #ff4040 !important; box-shadow: 0 0 5px #ff4040 !important; animation: pulse 2s infinite; }
  .logo-dot {
    width: 8px; height: 8px;
    background: #555;
    border-radius: 50%;
    box-shadow: none;
    display: inline-block;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,64,64,0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(255,64,64,0); }
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  

  /* LAYOUT */
  .layout {
    display: flex;
    flex-direction: column;
    margin-top: var(--topbar-h);
    height: calc(100vh - var(--topbar-h));
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section {
    padding: 14px 12px 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stream-item {
    display: flex;
    flex-direction: column;
    padding: 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    position: relative;
  }
  .stream-item:hover { background: var(--surface2); }
  .stream-item.active { background: #1e1a2e; }
  .stream-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .stream-thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: #111;
  }
  .stream-thumb-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .stream-thumb-wrap .thumb-fallback {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    font-size: 28px;
  }
  .stream-duration {
    position: absolute;
    bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.85);
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 2px;
    color: #fff;
  }

  .stream-info {
    padding: 8px 10px;
  }
  .stream-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .stream-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 4px;
  }
  .stream-games-mini {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .game-tag-mini {
    font-family: var(--mono);
    font-size: 9px;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 2px;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); }

  /* VIDEO AREA */
  .video-section {
    background: #000;
    position: relative;
  }

  .video-wrapper {
    position: relative;
    padding-bottom: 46%;
    height: 0;
  }
  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .no-video {
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    background: #080810;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .no-video .icon { font-size: 40px; opacity: 0.3; }

  /* VIDEO META */
  .video-meta {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .video-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .video-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
  }

  .video-date-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    padding-top: 3px;
  }

  .video-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }
  .stat {
    font-family: var(--mono);
    font-size: 12px;
    color: #bbbd);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat b { color: var(--text); }

  /* GAME SEGMENTS */
  .segments-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    margin-bottom: 8px;
  }

  .segments {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .segment-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .segment-btn:hover {
    border-color: var(--accent);
    background: rgba(124,92,252,0.1);
  }
  .segment-btn.active {
    border-color: var(--accent);
    background: rgba(124,92,252,0.18);
    color: var(--accent);
  }
  .segment-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: rgba(0,0,0,0.3);
    padding: 1px 5px;
    border-radius: 2px;
  }
  .segment-btn.active .segment-time { color: rgba(124,92,252,0.7); }

  /* TIMELINE BAR */
  .timeline-wrap {
    padding: 0 20px 0;
    background: var(--surface);
    padding-bottom: 14px;
  }
  .timeline-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    display: flex;
    overflow: hidden;
    gap: 1px;
    cursor: pointer;
  }
  .timeline-seg {
    height: 100%;
    transition: filter 0.2s;
    border-radius: 1px;
  }
  .timeline-seg:hover { filter: brightness(1.4); }

  /* MULTI-PART */
  .parts-section {
    padding: 12px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .parts-section.visible { display: block; }
  .parts-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .parts-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .part-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .part-btn:hover { border-color: var(--accent2); color: var(--text); }
  .part-btn.active {
    border-color: var(--accent2);
    background: rgba(252,92,125,0.1);
    color: var(--accent2);
  }

  /* TWITCH CHAT PANEL */
  .chat-panel {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    height: 100%;
  }

  .chat-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .chat-header-icon { font-size: 14px; }
  .chat-header-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex: 1;
  }
  .chat-mode-toggle {
    font-family: var(--mono);
    font-size: 9px;
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .chat-mode-btn {
    padding: 4px 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 9px;
    transition: all 0.1s;
  }
  .chat-mode-btn.active { background: var(--accent); color: white; }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-msg {
    padding: 3px 10px;
    font-size: 12px;
    line-height: 1.5;
    word-break: break-word;
    transition: background 0.1s;
  }
  .chat-msg:hover { background: rgba(255,255,255,0.03); }
  .chat-msg-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-right: 4px;
    cursor: pointer;
    transition: color 0.12s;
  }
  .chat-msg-time:hover { color: var(--accent); }
  .chat-msg-user {
    font-weight: 700;
    margin-right: 4px;
    cursor: pointer;
  }
  .chat-msg-text { color: var(--text); }

  /* EMOTES */
  .chat-emote {
    display: inline-block;
    vertical-align: middle;
    height: 22px;
    width: auto;
    margin: 0 1px;
    image-rendering: auto;
  }
  .chat-emote-animated {
    height: 22px;
  }
  .chat-msg-text a { color: var(--accent); text-decoration: none; }


  .chat-footer {
    padding: 6px 10px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .chat-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 20px;
    text-align: center;
  }
  .chat-placeholder-icon { font-size: 32px; opacity: 0.3; }

  /* CONFIG MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 460px;
    max-width: 95vw;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-size: 14px;
    font-weight: 700;
  }
  .modal-close {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1;
    transition: color 0.1s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 20px; }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    transition: border-color 0.15s;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .field-help {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
  }

  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost {
    background: none;
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-primary:hover { filter: brightness(1.1); }

  /* STATUS BAR */
  .status-bar {
    padding: 6px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: #ccc;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }
  .status-dot.ok { background: #4ade80; }
  .status-dot.error { background: var(--live); }

  /* SCROLLBAR */
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* RESPONSIVE */
  @media (max-width: 1100px) {
    .chat-panel { display: none; }
  }
  @media (max-width: 700px) {
    .sidebar { width: 180px; }
  }

  /* LOADING */
  .loader {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    gap: 20px;
    z-index: 100;
    pointer-events: none;
  }
  .loader-dots {
    display: flex;
    gap: 8px;
  }
  .loader-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-10px); opacity: 1; }
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
    grid-column: 1 / -1;
    width: 100%;
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }

  .streak-badge {
    font-family: var(--mono);
    font-size: 9px;
    background: rgba(252,92,125,0.15);
    border: 1px solid rgba(252,92,125,0.3);
    color: var(--accent2);
    padding: 2px 6px;
    border-radius: 2px;
    margin-left: 6px;
  }

  /* THEATER MODE */
  .theater-btn-wrap {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 20;
  }
  .theater-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: var(--surface2);
    border: 1px solid #444;
    color: var(--text);
    padding: 7px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .theater-btn:hover { border-color: var(--accent); background: rgba(124,92,252,0.15); color: var(--accent); }
  .theater-btn.active { border-color: var(--accent); background: rgba(124,92,252,0.2); color: var(--accent); }
  .theater-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Theater mode — video fills left, chat pinned right */
  body.theater .topbar { display: none; }
  body.theater .layout { height: 100vh; margin-top: 0; display: flex; flex-direction: column; }
  body.theater #gridView { display: none !important; }
  body.theater .player-view { flex: 1; display: flex !important; flex-direction: column; overflow: hidden; }
  body.theater .player-topbar { display: none !important; }
  body.theater #theaterBtnWrap { display: none !important; }
  body.theater #theaterBarWrap { display: none !important; }
  body.theater .player-view > div[style*="display:flex"] { flex: 1; overflow: hidden; }

  .player-view.active { display: flex; }

  body.theater .main {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
  }
  body.theater .video-content-wrap {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  body.theater .video-section {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  body.theater .video-wrapper {
    flex: 1; padding-bottom: 0 !important; height: 100% !important; position: relative !important;
  }
  body.theater .video-wrapper iframe,
  body.theater #ytPlayerEl,
  body.theater #ytPlayerEl iframe {
    position: absolute !important;
    top: 0; left: 0;
    width: 100% !important; height: 100% !important;
  }
  body.theater .video-meta { display: none !important; }
  body.theater .timeline-wrap { display: none !important; }
  body.theater .parts-section { display: none !important; }
  body.theater .status-bar { display: none !important; }
  body.theater .chat-panel { display: flex !important; width: 320px; flex-shrink: 0; }
  body.theater .resize-handle { display: block; }

  /* ── GRID HOME ─────────────────────────────────────────────────── */
  .grid-view {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    background: var(--bg);
  }
  .grid-view::-webkit-scrollbar { width: 4px; }
  .grid-view::-webkit-scrollbar-thumb { background: var(--border); }

  .grid-header {
    margin-top: 14px;
    margin-bottom: 20px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .grid-header-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .grid-header-count {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: #bbb;
  }

  .stream-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }

  .grid-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  }
  .grid-card:hover {
    border-color: var(--accent);
    outline: 2px solid var(--accent);
    transform: translateY(-2px);

async function resolveChannelId(channelInput, apiKey) {
  if (channelInput.startsWith('UC')) return channelInput;
  const handle = channelInput.replace('@','');
  const url = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${apiKey}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`API error ${r.status}: ${r.statusText} — check API key restrictions in Google Console`);
  const d = await r.json();
  if (d.error) throw new Error(`YouTube API: ${d.error.message}`);
  if (d.items && d.items.length) return d.items[0].id;
  const url2 = `https://www.googleapis.com/youtube/v3/channels?part=id&forUsername=${handle}&key=${apiKey}`;
  const r2 = await fetch(url2);
  const d2 = await r2.json();
  if (d2.error) throw new Error(`YouTube API: ${d2.error.message}`);
  if (d2.items && d2.items.length) return d2.items[0].id;
  throw new Error('Channel not found — check the channel handle');
}

// Smart fetch — tries direct first, then multiple CORS proxies
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`,
];
let _proxyIdx = -1; // -1 = try direct first
async function apiFetch(url) {
  if (_proxyIdx >= 0) {
    // Already using a proxy
    return fetch(PROXIES[_proxyIdx](url));
  }
  try {
    const r = await fetch(url);
    // Some proxies return 200 even for errors — check it's real
    if (r.ok || r.status === 403 || r.status === 400) return r;
    throw new Error(`HTTP ${r.status}`);
  } catch(e) {
    console.warn('Direct fetch failed:', e.message, '— trying proxies...');
    // Try each proxy in order
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const pr = await fetch(PROXIES[i](url));
        if (pr.ok) {
          console.log('Proxy', i, 'worked');
          _proxyIdx = i;
          return pr;
        }
      } catch(pe) {
        console.warn('Proxy', i, 'failed:', pe.message);
      }
    }
    throw new Error('All fetch attempts failed — check browser console for details');
  }
}

async function fetchAllVideos(channelId, apiKey) {
  // Get uploads playlist
  const r = await apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&id=${channelId}&key=${apiKey}`);
  if (!r.ok) throw new Error(`API error ${r.status} — check your API key is unrestricted or allows localhost`);
  const d = await r.json();
  if (d.error) throw new Error(`YouTube API: ${d.error.message}`);
  if (!d.items || !d.items.length) throw new Error('Channel not found');
  const uploadsId = d.items[0].contentDetails.relatedPlaylists.uploads;

  let videos = [];
  let pageToken = '';
  while (true) {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId=${uploadsId}&maxResults=50&key=${apiKey}${pageToken ? '&pageToken='+pageToken : ''}`;
    const pr = await apiFetch(url);
    const pd = await pr.json();
    if (!pd.items) break;
    // Get video IDs for duration
    const ids = pd.items.map(i => i.contentDetails.videoId).join(',');
    const vr = await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids}&key=${apiKey}`);
    const vd = await vr.json();
    const detailMap = {};
    (vd.items || []).forEach(v => { detailMap[v.id] = v; });

    pd.items.forEach(item => {
      const sn = item.snippet;
      const vid = item.contentDetails.videoId;
      const detail = detailMap[vid] || {};
      videos.push({
        id: vid,
        title: sn.title,
        publishedAt: sn.publishedAt,
        thumb: (sn.thumbnails.maxres || sn.thumbnails.high || sn.thumbnails.medium || {url:''}).url,
        duration: detail.contentDetails ? parseISO8601(detail.contentDetails.duration) : 0,
        views: detail.statistics ? parseInt(detail.statistics.viewCount||0) : 0,
        description: sn.description || '',
      });
    });
    pageToken = pd.nextPageToken || '';
    if (!pageToken) break;
  }
  return videos;
}

function parseISO8601(s) {
  // PT4H23M12S
  const m = s.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}

function formatDuration(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ─── GROUP VIDEOS INTO STREAMS ─────────────────────────────────────────────
// A "stream" = same calendar day. Multiple videos on same day = parts of same stream.
function groupIntoStreams(videos) {
  // Filter out videos under 10 minutes
  videos = videos.filter(v => v.duration >= 600);
  const byDay = {};
  videos.forEach(v => {
    const day = v.publishedAt.slice(0,10); // YYYY-MM-DD
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(v);
  });
  return Object.entries(byDay)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .map(([day, vids]) => {
      vids.sort((a,b) => a.publishedAt.localeCompare(b.publishedAt));
      const totalDuration = vids.reduce((s,v) => s + v.duration, 0);
      const games = parseGamesFromDescriptions(vids);
      return {
        day,
        vids,
        totalDuration,
        games,
        thumb: vids[0].thumb,
        title: buildStreamTitle(vids, day),
      };
    });
}

function buildStreamTitle(vids, day) {
  // Use first video's title, strip part indicators
  let t = vids[0].title.replace(/\s*[\[\(]?part\s*\d+[\]\)]?/gi,'').replace(/\s+VOD\s*/gi,' ').trim();
  return t || `Stream — ${formatDay(day)}`;
}

function formatDay(day) {
  return new Date(day+'T12:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ─── GAME PARSING ───────────────────────────────────────────────────────────
// Look for lines like "00:00 Game Name" or "[Game] Timestamp" in descriptions
function parseGamesFromDescriptions(vids) {
  const segments = [];
  let offset = 0;
  vids.forEach((v, pi) => {
    const lines = v.description.split('\n');
    const tsLines = [];
    lines.forEach(line => {
      // Match "HH:MM:SS Game" or "MM:SS Game" or "0:00 - Game"
      const m = line.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s*[-–]?\s*(.+)/);
      if (m) {
        const t = parseTimestamp(m[1]);
        const label = m[2].trim();
        if (label.length > 0 && label.length < 80) {
          tsLines.push({t: offset + t, label, partIdx: pi});
        }
      }
    });
    if (tsLines.length) segments.push(...tsLines);
    offset += v.duration;
  });
  return segments;
}

function parseTimestamp(s) {
  const parts = s.split(':').map(Number);
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  return parts[0]*60 + parts[1];
}

    for (let i = 0; i < totalPages; i++) {
      if (i === 0 || i === totalPages-1 || Math.abs(i - currentPage) <= 2) {
        pages.push(i);
      }
    }
    // Insert ellipsis
    const withEllipsis = [];
    let prev = -1;
    pages.forEach(p => {
      if (prev !== -1 && p - prev > 1) withEllipsis.push('...');
      withEllipsis.push(p);

    nums.innerHTML = withEllipsis.map(p =>

        : `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p+1}</button>`

    // Query 2: VideoMoments (alternative)

  ];

  for (const query of queries) {

      const resp = await fetch('https://gql.twitch.tv/gql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Client-Id': 'kimne78kx3ncx6brgo4mv6wki5h1ko' },

        return edges.map(e => ({
          label: e.node?.details?.game?.displayName || e.node?.game?.displayName || e.node?.description || 'Unknown',
          t: Math.floor((e.node?.positionMilliseconds || 0) / 1000),
        })).filter(c => c.label !== 'Unknown' || c.t > 0);
      }

      // Shape 2: game directly on video
      if (video?.game?.displayName) {
        return [{ label: video.game.displayName, t: 0 }];
      }
    } catch(e) {
      console.warn('Chapter query failed:', query.operationName, e.message);
    }
  }
  console.warn('No chapters found for VOD', vodId);
  return [];
}

function renderSegments(stream) {
  const segLabel = document.querySelector('.segments-label');
  if (segLabel) segLabel.style.display = '';
  const segsEl = document.getElementById('segmentBtns');
  const timelineWrap = document.getElementById('timelineWrap');
  const total = stream.totalDuration;
  const games = stream.games;

  // Segment buttons
  segsEl.innerHTML = games.map((g, i) => {
    const color = colorFor(i);
    const end = (games[i+1]?.t) || total;
    const durSec = end - g.t;
    const pct = total ? Math.round((durSec / total) * 100) : 0;
    return `<button class="segment-btn" onclick="jumpToSegment(${i})" title="Jump to ${escHtml(g.label)} at ${formatDuration(g.t)}" style="--seg-color:${color}">
      <span class="seg-dot" style="background:${color}"></span>
      <span class="seg-label">${escHtml(g.label)}</span>
      <span class="seg-pct">${pct}%</span>
      <span class="seg-time">${formatDuration(g.t)}</span>
    </button>`;
  }).join('');

  // Timeline bar
  const bar = document.getElementById('timelineBar');
  bar.innerHTML = games.map((g, i) => {
    const start = g.t;
    const end = (games[i+1]?.t) || total;
    const pct = ((end - start) / total * 100).toFixed(2);
    const color = colorFor(i);
    return `<div class="timeline-seg" style="width:${pct}%;background:${color}" title="${escHtml(g.label)} · ${formatDuration(start)} → ${formatDuration(end)}" onclick="jumpToSegment(${i})"></div>`;
  }).join('');

  // Timeline labels row below bar
  const labelsEl = document.getElementById('timelineLabels');
  if (labelsEl) {
    labelsEl.innerHTML = games.map((g, i) => {
      const start = g.t;
      const end = (games[i+1]?.t) || total;
      const pct = ((end - start) / total * 100).toFixed(2);
      const color = colorFor(i);
      return `<div class="timeline-label" style="width:${pct}%;color:${color}" onclick="jumpToSegment(${i})" title="${formatDuration(start)}">${escHtml(g.label)}</div>`;
    }).join('');
  }

  timelineWrap.style.display = 'block';
}

function renderTimeline(stream) {
  const bar = document.getElementById('timelineBar');
  const total = stream.totalDuration;
  if (!total || !stream.games.length) { bar.innerHTML=''; return; }
  const segs = stream.games;
  let html = '';
  segs.forEach((g, i) => {
    const start = g.t;
    const end = (segs[i+1]?.t) || total;
    const pct = ((end - start) / total * 100).toFixed(2);
    const color = colorFor(i);
    html += `<div class="timeline-seg" style="width:${pct}%;background:${color}" title="${escHtml(g.label)} @ ${formatDuration(g.t)}" onclick="jumpToSegment(${i})"></div>`;
  });
  bar.innerHTML = html;
}

function selectPart(partIdx) {
  currentPartIdx = partIdx;
  document.querySelectorAll('.part-btn').forEach((el,i) => el.classList.toggle('active', i===partIdx));
  renderVideoPlayer(currentStream, partIdx);
  renderChat(currentStream, partIdx);
}

function jumpToSegment(segIdx) {
  const seg = currentStream.games[segIdx];
  if (!seg) return;

  // Compute which video part this timestamp falls in
  let cumulative = 0;
  let partIdx = 0;
  for (let i = 0; i < currentStream.vids.length; i++) {
    const partEnd = cumulative + currentStream.vids[i].duration;
    if (seg.t < partEnd || i === currentStream.vids.length - 1) {
      partIdx = i;
      break;
    }
    cumulative += currentStream.vids[i].duration;
  }

  const startSec = Math.max(0, seg.t - cumulative);

  // If we need to switch parts, load that part first
  if (partIdx !== currentPartIdx) {
    currentPartIdx = partIdx;
    renderVideoPlayer(currentStream, partIdx);
    // Wait for player to be ready then seek
    const waitAndSeek = setInterval(() => {
      if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
        clearInterval(waitAndSeek);
        ytPlayer.seekTo(startSec, true);
        ytPlayer.playVideo();
        // Reset chat pointer
        chatPointer = chatMessages.findIndex(m => m.offset >= seg.t);
        if (chatPointer < 0) chatPointer = 0;
        const box = document.getElementById('chatMessages');
        if (box) box.innerHTML = '';
      }
    }, 200);
  } else {
    // Same part — just seek
    if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
      ytPlayer.seekTo(startSec, true);
      ytPlayer.playVideo();
      // Reset chat to this position
      chatPointer = chatMessages.findIndex(m => m.offset >= seg.t);
      if (chatPointer < 0) chatPointer = 0;
      const box = document.getElementById('chatMessages');
      if (box) box.innerHTML = '';
    }
  }

  document.querySelectorAll('.segment-btn').forEach((el,i) => el.classList.toggle('active', i===segIdx));
  document.querySelectorAll('.timeline-seg').forEach((el,i) => el.style.filter = i===segIdx ? 'brightness(1.4)' : '');
}

// ─── CHAT ───────────────────────────────────────────────────────────────────
// ── Chat Replay Engine ────────────────────────────────────────────────────
let chatMessages = [];       // all messages for current stream sorted by offset
let chatPointer = 0;         // index of next message to show
let chatSyncInterval = null;
let vodStartTime = null;     // unix ms when VOD started
let autoScroll = true;

function stopChatSync() {
  if (chatSyncInterval) { clearInterval(chatSyncInterval); chatSyncInterval = null; }
  const el = document.getElementById('chatSyncStatus');
  if (el) el.textContent = '⏸ paused';
}

let lastSyncPos = -1;
function startChatSync() {
  stopChatSync();
  if (!chatMessages.length || !ytPlayer) return;
  const el = document.getElementById('chatSyncStatus');
  if (el) el.textContent = '▶ replaying';
  chatSyncInterval = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const pos = ytPlayer.getCurrentTime();

    // Detect seek backwards — reset pointer and clear chat
    if (pos < lastSyncPos - 2) {
      const box = document.getElementById('chatMessages');
      if (box) box.innerHTML = '';
      chatPointer = 0;
      // Fast-forward pointer to correct position
      while (chatPointer < chatMessages.length && chatMessages[chatPointer].offset < pos - 0.5) {
        chatPointer++;
      }
    }
    lastSyncPos = pos;

    // Render messages up to current position
    let rendered = 0;
    while (chatPointer < chatMessages.length && chatMessages[chatPointer].offset <= pos) {
      appendChatMsg(chatMessages[chatPointer]);
      chatPointer++;
      rendered++;
    }
    if (rendered > 0 && autoScroll) scrollChatToBottom();
  }, 500);
}

function appendChatMsg(msg) {
  const box = document.getElementById('chatMessages');
  if (!box) return;
  // Remove placeholder if present
  const ph = box.querySelector('.chat-placeholder');
  if (ph) ph.remove();

  const div = document.createElement('div');
  div.className = 'chat-msg';
  const displayOffset = Math.max(0, msg.offset);
  const h = Math.floor(displayOffset / 3600);
  const mins = Math.floor((displayOffset % 3600) / 60);
  const secs = Math.floor(displayOffset % 60);
  const timeStr = h > 0
    ? `${h}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`
    : `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  div.innerHTML = `<span class="chat-msg-time" title="Jump to ${timeStr}">${timeStr}</span><span class="chat-msg-user" style="color:${msg.color||'#9146ff'}">${escHtml(msg.user)}</span><span class="chat-msg-text">: ${parseMessageText(msg.text)}</span>`;
  // Click TIMESTAMP to seek
  div.querySelector('.chat-msg-time').addEventListener('click', () => {
    if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
      ytPlayer.seekTo(displayOffset, true);
      ytPlayer.playVideo();
    }
  });
  // Click username to seek
  div.querySelector('.chat-msg-user').addEventListener('click', () => {
    if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
      ytPlayer.seekTo(msg.offset, true);
      chatPointer = chatMessages.findIndex(m => m.offset >= msg.offset);
      if (chatPointer < 0) chatPointer = 0;
    }
  });
  box.appendChild(div);
  // Keep max 300 messages in DOM
  while (box.children.length > 300) box.removeChild(box.firstChild);
}

function scrollChatToBottom() {
  const box = document.getElementById('chatMessages');
  if (box) box.scrollTop = box.scrollHeight;
}

// Detect manual scroll = disable autoscroll
document.addEventListener('DOMContentLoaded', () => {
  const box = document.getElementById('chatMessages');
  if (box) {
    box.addEventListener('scroll', () => {
      autoScroll = box.scrollTop + box.clientHeight >= box.scrollHeight - 40;
    });
  }
});

async function renderChat(stream) {
  stopChatSync();
  chatMessages = [];
  chatPointer = 0;
  autoScroll = true;

  const box = document.getElementById('chatMessages');
  const note = document.getElementById('chatHeaderNote');
  const footer = document.getElementById('chatFooter');

  box.innerHTML = '<div class="chat-placeholder"><div class="chat-placeholder-icon" style="font-size:24px;opacity:0.3">⏳</div><div>Loading chat…</div></div>';
  if (footer) footer.style.display = 'none';

  // Determine vodStart — prefer Twitch VOD created_at for accuracy
  let vodStart = null;
  const vodId = twitchVodMap[stream.day];
  if (vodId && twitchVodDetails && twitchVodDetails[vodId]) {
    vodStart = new Date(twitchVodDetails[vodId].created_at).getTime();
    console.log('vodStart from Twitch:', new Date(vodStart).toISOString());
  }
  if (!vodStart) {
    const lastVid = stream.vids[stream.vids.length - 1];
    vodStart = new Date(lastVid.publishedAt).getTime() - (stream.totalDuration * 1000);
    console.log('vodStart estimated:', new Date(vodStart).toISOString());
  }
  vodStartTime = vodStart;

  const channel = config.twitch || 'shlbez';

  // Fetch rustlog by calendar day — always fetch prev, current and next day
  // so we never miss messages regardless of timezone offsets
  const fetchDay = async (date) => {
    const y = date.getUTCFullYear();
    const mo = String(date.getUTCMonth()+1).padStart(2,'0');
    const d = String(date.getUTCDate()).padStart(2,'0');
    const url = `https://logs.ivr.fi/channel/${channel}/${y}/${mo}/${d}?json=true`;
    console.log('Fetching rustlog:', url);
    try {
      const r = await fetch(url);
      console.log('Rustlog status:', r.status, 'for', url);
      if (!r.ok) return [];
      const text = await r.text();
      console.log(`Rustlog raw [${url}] (first 400):`, text.slice(0, 400));
      if (!text || !text.trim()) return [];
      try {
        const data = JSON.parse(text);
        const msgs = Array.isArray(data) ? data : (data.messages || data.logs || []);
        console.log(`Rustlog ${y}-${mo}-${d}: ${msgs.length} messages`);
        return msgs;
      } catch(parseErr) {
        // Try parsing as newline-delimited JSON (some rustlog versions)
        const lines = text.trim().split('\n').filter(Boolean);
        const msgs = [];
        for (const line of lines) {
          try { msgs.push(JSON.parse(line)); } catch(e) {}
        }
        console.log(`Rustlog NDJSON ${y}-${mo}-${d}: ${msgs.length} messages`);
        return msgs;
      }
    } catch(e) {
      console.warn('Rustlog fetch error:', e.message, url);
      return [];
    }
  };

  try {
    const prevDay  = new Date(vodStart - 86400000);
    const startDay = new Date(vodStart);
    const nextDay  = new Date(vodStart + 86400000);

    const [prev, curr, next] = await Promise.all([fetchDay(prevDay), fetchDay(startDay), fetchDay(nextDay)]);
    const rawMsgs = [...prev, ...curr, ...next];
    console.log('Total raw messages:', rawMsgs.length);

    if (!rawMsgs.length) {
      const d0 = new Date(vodStart);
      const y0 = d0.getUTCFullYear(), mo0 = String(d0.getUTCMonth()+1).padStart(2,'0'), dd0 = String(d0.getUTCDate()).padStart(2,'0');
      const testUrl = `https://logs.ivr.fi/channel/${channel}/${y0}/${mo0}/${dd0}?json=true`;
      box.innerHTML = `<div class="chat-placeholder" style="padding:12px;align-items:flex-start;text-align:left">
        <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px">💬 No chat found</div>
        <div style="font-size:10px;color:var(--muted);line-height:1.8;word-break:break-all">
          Channel: <b style="color:#bbb">${channel}</b><br>
          Date tried: <b style="color:#bbb">${y0}-${mo0}-${dd0}</b><br>
          <a href="${testUrl}" target="_blank" style="color:var(--accent);font-size:9px">▶ Test this URL in new tab</a><br>
          <span style="opacity:0.6;font-size:9px">(should return JSON with messages array)</span>
        </div>
      </div>`;
      if (note) { note.textContent = 'no logs'; note.style.color = 'var(--muted)'; }
      return;
    }

    // Parse messages — rustlog uses "2025-11-20 18:32:11" or ISO format
    const msgs = rawMsgs.map(m => {
      // rustlog fields: timestamp/ts, text/message/content, username/displayName/user
      const rawTs = m.timestamp || m.ts || m.createdAt || '';
      let ts;
      if (rawTs.includes(' UTC')) {
        // Rustlog format: "2024-01-15 18:32:11.123 +0000 UTC"
        ts = new Date(rawTs.replace(' UTC','').replace(/\s\+0000$/,'Z').replace(' ','T')).getTime();
      } else {
        const tsStr = rawTs.replace(' ','T').replace(/([+-]\d{2}:\d{2})?$/,s=>s||'Z');
        ts = new Date(tsStr).getTime();
      }
      if (isNaN(ts)) return null;
      const offset = (ts - vodStart) / 1000;
      const text = m.text || m.message || m.content || '';
      const username = m.username || m.displayName || m.user || m.login || '?';
      const color = (m.tags && m.tags.color) || m.color || generateColor(username);

      // Register Twitch emotes
      if (m.tags && m.tags.emotes && typeof m.tags.emotes === 'string') {
        m.tags.emotes.split('/').forEach(part => {
          const [id, positions] = part.split(':');
          if (!positions) return;
          positions.split(',').forEach(pos => {
            const [start, end] = pos.split('-').map(Number);
            const word = text.slice(start, end + 1);
            if (word && !emoteMap[word]) {
              emoteMap[word] = { url: `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/2.0`, animated: false, source: 'twitch' };
            }
          });
        });
      }

      return { offset, user: username, text, color };
    }).filter(m => m !== null && !isNaN(m.offset)).sort((a,b) => a.offset - b.offset);

    console.log(`Parsed ${msgs.length} messages, offset range: ${msgs[0]?.offset?.toFixed(0)}s to ${msgs[msgs.length-1]?.offset?.toFixed(0)}s`);

    chatMessages = msgs;
    box.innerHTML = '';

    if (!msgs.length) {
      box.innerHTML = '<div class="chat-placeholder"><div class="chat-placeholder-icon" style="font-size:24px;opacity:0.3">💬</div><div>No chat found<br>for this stream</div></div>';
      if (note) { note.textContent = 'no logs'; note.style.color = 'var(--muted)'; }
      return;
    }

    if (note) {
      note.textContent = msgs.length + ' messages';
      note.style.color = 'var(--muted)';
    }
    if (footer) footer.style.display = '';

    // Show messages up to current video time immediately, then start sync
    const pos = (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') ? ytPlayer.getCurrentTime() : 0;
    chatPointer = 0;
    while (chatPointer < chatMessages.length && chatMessages[chatPointer].offset <= pos) {
      appendChatMsg(chatMessages[chatPointer]);
      chatPointer++;
    }
    scrollChatToBottom();
    startChatSync();

  } catch(e) {
    console.warn('Chat load failed:', e);
    box.innerHTML = `<div class="chat-placeholder"><div style="color:#f66;font-size:11px;line-height:1.6">Chat error:<br>${escHtml(e.message)}</div></div>`;
  }
}
// ── Resizable chat panel ──────────────────────────────
(function() {
  let dragging = false;
  let startX = 0;
  let startWidth = 0;

  document.addEventListener('mousedown', e => {
    const handle = document.getElementById('resizeHandle');
    if (!handle || e.target !== handle) return;
    dragging = true;
    startX = e.clientX;
    const panel = document.getElementById('chatPanel');
    startWidth = panel ? panel.offsetWidth : 320;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const panel = document.getElementById('chatPanel');
    if (!panel) return;
    const delta = startX - e.clientX; // moving left = wider chat
    const newWidth = Math.min(600, Math.max(200, startWidth + delta));
    panel.style.width = newWidth + 'px';
    panel.style.flexShrink = '0';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    const handle = document.getElementById('resizeHandle');
    if (handle) handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Touch support for mobile
  document.addEventListener('touchstart', e => {
    const handle = document.getElementById('resizeHandle');
    if (!handle || e.target !== handle) return;
    dragging = true;
    startX = e.touches[0].clientX;
    const panel = document.getElementById('chatPanel');
    startWidth = panel ? panel.offsetWidth : 320;
    handle.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const panel = document.getElementById('chatPanel');
    if (!panel) return;
    const delta = startX - e.touches[0].clientX;
    const newWidth = Math.min(600, Math.max(120, startWidth + delta));
    panel.style.width = newWidth + 'px';
    panel.style.flexShrink = '0';
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    const handle = document.getElementById('resizeHandle');
    if (handle) handle.classList.remove('dragging');
  });
})();

// ─── STREAM LOADING ──────────────────────────────────────────────────────────
const CACHE_KEY = 'shibez_streams_v1';
const CACHE_TTL = 30 * 60 * 1000; // 30 minutes

async function loadStreams() {
  const grid = document.getElementById('streamGrid');
  if (!config.ytApiKey || !config.ytChannel) {
    if (grid) grid.innerHTML = '<div class="loader"><span>Missing API config</span></div>';
    return;
  }

  // Load emotes in background
  loadEmotes();

  // Try cache first — show instantly, then refresh in background
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && cached.streams && (Date.now() - cached.ts) < CACHE_TTL) {
      allStreams = cached.streams;
      twitchVodMap = cached.vodMap || {};
      twitchVodDetails = cached.vodDetails || {};
      renderStreamList(allStreams);
      refreshStreams(false); // silent background refresh
      return;
    }
  } catch(e) {}

  if (grid) grid.innerHTML = '<div class="loader"><span>Loading streams</span><div class="loader-dots"><span></span><span></span><span></span></div></div>';
  await refreshStreams(true);
}

async function refreshStreams(showErrors) {
  const grid = document.getElementById('streamGrid');
  const setStatus = msg => { if (grid) grid.innerHTML = `<div class="loader"><span>${msg}</span><div class="loader-dots"><span></span><span></span><span></span></div></div>`; };
  try {
    setStatus('Resolving channel…');
    const channelId = config.ytChannel.startsWith('UC') ? config.ytChannel : await resolveChannelId(config.ytChannel, config.ytApiKey);
    console.log('Channel ID:', channelId);

    setStatus('Fetching videos…');
    const videos = await fetchAllVideos(channelId, config.ytApiKey);
    console.log('Videos fetched:', videos.length);

    setStatus('Grouping streams…');
    allStreams = groupIntoStreams(videos);
    console.log('Streams grouped:', allStreams.length);

    // Fetch Twitch VODs
    try {
      const token = await fetchTwitchToken();
      const { map, details } = await fetchTwitchVods(token);
      twitchVodMap = map;
      twitchVodDetails = details;
    } catch(te) {
      console.warn('Twitch VOD fetch failed:', te.message);
    }

    // Cache result
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        ts: Date.now(), streams: allStreams,
        vodMap: twitchVodMap, vodDetails: twitchVodDetails,
      }));
    } catch(e) {}

    renderStreamList(allStreams);
  } catch(e) {
    console.error('Load error:', e);
    if (!showErrors || !grid) return;

    const testUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${config.ytChannel}&key=${config.ytApiKey}`;
    let errMsg = e && e.message ? e.message : String(e);
    let hint = '';

    if (errMsg === 'Failed to fetch' || errMsg.includes('NetworkError') || errMsg.includes('network')) {
      hint = `<div style="margin-top:10px;font-size:10px;color:#aaa;line-height:1.8">
        This usually means:<br>
        • YouTube Data API v3 is not enabled for this API key<br>
        • The API key was deleted or regenerated<br>
        • A browser extension is blocking the request<br><br>
        <a href="${testUrl}" target="_blank" rel="noopener"
           style="color:var(--accent);text-decoration:underline;font-size:10px">
          ▶ Open API test URL in new tab
        </a><br>
        <span style="opacity:0.5">(should return JSON with channel info)</span>
      </div>`;
    }

    grid.innerHTML = `<div class="empty-state">
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px">I dont know what's wrong - Shibez</div>
      <img src="https://cdn.7tv.app/emote/01HSRVXPM8000A6C0AM9PT5M0A/2x.webp" alt="" style="height:64px;margin-bottom:10px">
      <div style="font-size:10px;color:#f99;font-family:var(--mono);max-width:380px;line-height:1.6">${escHtml(errMsg)}</div>
      ${hint}
    </div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function generateColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360},65%,60%)`;
}

let chatVisible = true;
function toggleChat() {
  chatVisible = !chatVisible;
  const panel = document.getElementById('chatPanel');
  const openBtn = document.getElementById('chatOpenBtn');
  const toggleBtn = document.getElementById('chatToggleBtn');
  if (chatVisible) {
    if (panel) panel.style.display = '';
    if (openBtn) openBtn.style.display = 'none';
    if (toggleBtn) { toggleBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>'; toggleBtn.title = 'Hide chat'; }
  } else {
    if (panel) panel.style.display = 'none';
    if (openBtn) openBtn.style.display = 'flex';
    if (toggleBtn) { toggleBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>'; toggleBtn.title = 'Show chat'; }
  }
}

async function checkLiveStatus() {
  try {
    const token = await fetchTwitchToken();
    const [userResp, streamResp] = await Promise.all([
      fetch('https://api.twitch.tv/helix/users?login=shlbez', {
        headers: { 'Client-ID': config.twitchClientId, 'Authorization': 'Bearer ' + token }
      }),
      fetch('https://api.twitch.tv/helix/streams?user_login=shlbez', {
        headers: { 'Client-ID': config.twitchClientId, 'Authorization': 'Bearer ' + token }
      })
    ]);
    const userData = await userResp.json();
    const streamData = await streamResp.json();

    if (userData.data && userData.data.length > 0) {
      const pfp = userData.data[0].profile_image_url;
      const img = document.getElementById('topbarAvatarImg');
      if (img) { img.src = pfp; img.style.display = 'block'; }
    }

    const statusEl = document.getElementById('streamStatus');
    const statusText = document.getElementById('streamStatusText');
    const dot = document.querySelector('.logo-dot');
    const banner = document.getElementById('liveBanner');
    const bannerGame = document.getElementById('liveBannerGame');
    const bannerEmbed = document.getElementById('liveBannerEmbed');

    if (streamData.data && streamData.data.length > 0) {
      const stream = streamData.data[0];
      if (statusEl) statusEl.className = 'stream-status live-status';
      if (statusText) statusText.innerHTML = `<a href="https://www.twitch.tv/shlbez" target="_blank" style="color:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px;"><span class="live-dot"></span>Shibez is LIVE! <img src="https://cdn.7tv.app/emote/01F6N0NRYR000AR0YATR3Q3CPR/2x.webp" class="status-emote" alt=""></a>`;
      const meta1 = document.getElementById('liveBannerMeta');
      if (meta1) {
        const g1 = stream.game_name || 'streaming';
        const slug1 = g1.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        meta1.innerHTML = `<a href="https://www.twitch.tv/directory/category/${slug1}" target="_blank" style="color:#ff6060;text-decoration:none;border-bottom:1px solid rgba(255,96,96,0.4)">Category: ${g1}</a> · ⏱ ${formatUptime(stream.started_at)}`;
        meta1.style.display = 'block';
      }
      if (dot) dot.classList.add('live');
      if (banner && !banner.classList.contains('visible')) {
        banner.classList.add('visible');
        if (bannerGame) bannerGame.textContent = stream.game_name || '';
        if (bannerEmbed) {
          const parent = location.hostname || 'localhost';
          bannerEmbed.innerHTML = `<iframe src="https://player.twitch.tv/?channel=shlbez&parent=${parent}&autoplay=false" allowfullscreen></iframe>`;
        }
      }
    } else {
      if (statusEl) statusEl.className = 'stream-status offline-status';
      if (statusText) statusText.innerHTML = 'Shibez is currently offline <img src="https://cdn.7tv.app/emote/01GB8HJ61R0000X4MX5ZF49QE8/2x.webp" class="status-emote" alt="">';
      if (dot) dot.classList.remove('live');
      if (banner) { banner.classList.remove('visible'); if (bannerEmbed) bannerEmbed.innerHTML = ''; }
    }
  } catch(e) {
    console.warn('Live check failed:', e.message);
  }
}




// ── Uptime helper ──────────────────────────────────────────────────────────────
function formatUptime(startedAt) {
  const secs = Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000);
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── Check if shlbez is live ──────────────────────────────────────────────────
async function demoLiveAsBadgeInsider() {
  const banner      = document.getElementById('liveBanner');
  const bannerGame  = document.getElementById('liveBannerGame');
  const bannerEmbed = document.getElementById('liveBannerEmbed');
  const dot         = document.querySelector('.logo-dot');
  const statusText  = document.getElementById('streamStatusText');
  const statusEl    = document.getElementById('streamStatus');

  try {
    const token = await fetchTwitchToken();
    const r = await fetch('https://api.twitch.tv/helix/streams?user_login=shlbez', {
      headers: { 'Client-ID': config.twitchClientId, 'Authorization': 'Bearer ' + token }
    });
    const d = await r.json();

    if (d.data && d.data.length > 0) {
      const stream = d.data[0];
      const game = escHtml(stream.game_name || 'streaming');

      // Topbar dot + status
      if (dot) dot.classList.add('live');
      if (statusEl) statusEl.className = 'stream-status live-status';
      if (statusText) statusText.innerHTML =
        `<a href="https://www.twitch.tv/shlbez" target="_blank" style="color:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px;"><span class="live-dot"></span>Shibez is LIVE! <img src="https://cdn.7tv.app/emote/01F6N0NRYR000AR0YATR3Q3CPR/2x.webp" class="status-emote" alt=""></a>`;
      const meta2 = document.getElementById('liveBannerMeta');
      if (meta2) {
        const catSlug = game.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        meta2.innerHTML = `<a href="https://www.twitch.tv/directory/category/${catSlug}" target="_blank" style="color:#ff6060;text-decoration:none;border-bottom:1px solid rgba(255,96,96,0.4)">Category: ${game}</a> · ⏱ ${formatUptime(stream.started_at)}`;
        meta2.style.display = 'block';
      }

      // Live banner
      if (banner) {
        banner.style.display = 'flex';
        if (bannerGame) bannerGame.textContent = game;
        if (bannerEmbed && !bannerEmbed.querySelector('iframe')) {
          const parent = location.hostname || 'localhost';
          bannerEmbed.innerHTML =
            `<iframe src="https://player.twitch.tv/?channel=shlbez&parent=${parent}&autoplay=false"` +
            ` frameborder="0" allowfullscreen></iframe>`;
        }
      }
    } else {
      // offline
      if (dot) dot.classList.remove('live');
      if (banner) banner.style.display = 'none';
      const metaOff = document.getElementById('liveBannerMeta');
      if (metaOff) metaOff.style.display = 'none';
      if (statusEl) statusEl.className = 'stream-status offline-status';
      if (statusText) statusText.innerHTML =
        'Shibez is currently offline ' +
        '<img src="https://cdn.7tv.app/emote/01GB8HJ61R0000X4MX5ZF49QE8/2x.webp" class="status-emote" alt="">';
    }
  } catch(e) {
    console.warn('Live check failed:', e.message);
    if (dot) dot.classList.remove('live');
    if (banner) banner.style.display = 'none';
    if (statusEl) statusEl.className = 'stream-status offline-status';
    if (statusText) statusText.innerHTML = 'Shibez is currently offline';
  }
}
